name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.0.0-test)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller
        python -m pip install -r requirements.txt

    - name: 🔨 Package Application with PyInstaller
      run: pyinstaller --onefile --name concentration_analysis concentration_analysis.py

    - name: ⬆️ Upload Executable as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-EXE
        path: dist/concentration_analysis.exe

  create_release:
    name: Create GitHub Release
    needs: build_windows
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Download Windows EXE Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-EXE
          path: ./release_assets/

      - name: 🏷️ Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: ./release_assets/concentration_analysis.exe
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
